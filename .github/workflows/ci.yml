name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
        with:
          version: "0.5.0"
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - run: uv sync --frozen
      - run: uv run ruff check
      - run: uv run pytest
