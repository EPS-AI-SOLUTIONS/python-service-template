name: CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.28"
          enable-cache: true
      - uses: actions/setup-python@v7
        with:
          python-version: "3.14"
      - run: uv sync --frozen
      - run: uv run ruff check
      - run: uv run pytest
