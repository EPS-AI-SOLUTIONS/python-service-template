name: Template Validation
on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7

      - uses: astral-sh/setup-uv@v8.3.2
        with:
          version: "0.11.32"
          enable-cache: true

      - uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: uv sync (frozen)
        run: uv sync --frozen

      - name: ruff check
        run: uv run ruff check

      - name: pytest
        run: uv run pytest

      - name: uv build (wheel + sdist)
        run: uv build

      - uses: docker/setup-buildx-action@v4

      - name: Docker build (no push)
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          load: true
          tags: local/python-service-template:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test image
        run: |
          docker run --rm local/python-service-template:ci uvicorn --version
          docker run --rm local/python-service-template:ci python -c "from template_pkg.main import app; print(app.title)"
